# Avalanche full node - mainnet or Fuji (AVAXT) selected via .env
# See: https://build.avax.network/docs/nodes/run-a-node/using-docker

services:
  avax:
    build: .
    image: avax-rpc-node:local
    container_name: ${CONTAINER_NAME:-avax-mainnet}
    restart: unless-stopped
    environment:
      AVAX_NETWORK: ${AVAX_NETWORK:-mainnet}
      SNAPSHOT_RESTORE: ${SNAPSHOT_RESTORE:-true}
      SNAPSHOT_URL: ${SNAPSHOT_URL:-}
      SNAPSHOT_VARIANT: ${SNAPSHOT_VARIANT:-pruned}
    ports:
      - "127.0.0.1:${HTTP_PORT:-9650}:9650"   # HTTP RPC (localhost only)
      - "${P2P_PORT:-9651}:9651"              # P2P / staking
    volumes:
      - ${DATA_DIR:-./data}:/root/.avalanchego
      - ./configs/chains/C/config.json:/root/.avalanchego/configs/chains/C/config.json:ro
      - ./configs/chains/X/config.json:/root/.avalanchego/configs/chains/X/config.json:ro
      - ./configs/chains/P/config.json:/root/.avalanchego/configs/chains/P/config.json:ro
